<script src="/static/locale.js"></script>
<script>
var _iLastH = 0;
function sendHeight() {
  var h = document.body.scrollHeight;
  if (h !== _iLastH) {
    _iLastH = h;
    window.parent.postMessage({type: 'invito-resize', height: h}, '*');
  }
}
document.addEventListener('DOMContentLoaded', sendHeight);
document.addEventListener('htmx:afterSwap', sendHeight);
</script>
