{{define "dashboard/availability.html"}}
{{template "layout.html" .}}
{{end}}

{{define "title"}}Availability — Invito{{end}}

{{define "content"}}
{{template "dash-nav" .}}
<div class="page-header">
  <h1>Weekly Availability</h1>
</div>

<form method="post" action="/dashboard/availability" style="max-width:600px">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
  <table class="avail-table">
    <thead>
      <tr>
        <th>Day</th>
        <th>Active</th>
        <th>From</th>
        <th>To</th>
      </tr>
    </thead>
    <tbody>
    {{range $i, $rule := .Rules}}
    <tr>
      <td><strong>{{index $.Weekdays $i}}</strong></td>
      <td><input type="checkbox" name="day_{{$i}}_active"{{if $rule.Active}} checked{{end}}></td>
      <td><input type="time" name="day_{{$i}}_start" value="{{$rule.StartTime}}"></td>
      <td><input type="time" name="day_{{$i}}_end" value="{{$rule.EndTime}}"></td>
    </tr>
    {{end}}
    </tbody>
  </table>
  <div style="margin-top:1.5rem">
    <button type="submit" class="btn btn-primary">Save availability</button>
  </div>
</form>
{{end}}
