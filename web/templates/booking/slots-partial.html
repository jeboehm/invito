{{define "booking/slots-partial.html"}}
{{if .Slots}}
<form method="post" action="/calendar/{{.User.Username}}/{{.EventType.Slug}}/book">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
  <input type="hidden" name="slot" id="selected-slot">

  <div class="slot-grid" style="margin-bottom:1.5rem">
    {{range .Slots}}
    <button type="button" class="slot-btn"
      onclick="selectSlot(this, '{{.Start.UTC.Format "2006-01-02T15:04:05Z"}}')">
      {{.Start.Format "15:04"}}
    </button>
    {{end}}
  </div>

  <div id="booking-form" style="display:none;max-width:400px">
    <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:1rem">Your details</h2>
    <div class="form-group">
      <label>Your name</label>
      <input type="text" name="guest_name" required>
    </div>
    <div class="form-group">
      <label>Your email</label>
      <input type="email" name="guest_email" required>
    </div>
    <div class="form-group">
      <label>Note (optional)</label>
      <textarea name="guest_note" placeholder="Anything you'd like me to know in advance?"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Request booking</button>
  </div>
</form>

<script>
function selectSlot(btn, value) {
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('selected-slot').value = value;
  document.getElementById('booking-form').style.display = 'block';
}
</script>
{{else}}
<p style="color:#6b7280;padding:1rem 0">No available slots for this day.</p>
{{end}}
{{end}}
